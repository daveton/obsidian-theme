name: Release Dave Themes Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build themes
        run: node scripts/build-themes.js

      - name: Package Plugin
        run: |
          mkdir -p releases
          
          # Create plugin directory structure
          PLUGIN_DIR="dave-themes"
          mkdir -p "$PLUGIN_DIR"
          
          # Copy plugin files
          cp manifest.json "$PLUGIN_DIR/"
          cp main.js "$PLUGIN_DIR/"
          cp -r themes "$PLUGIN_DIR/"
          
          # Create zip package
          zip_file="releases/dave-themes-v${{ steps.get_version.outputs.VERSION }}.zip"
          zip -r "$zip_file" "$PLUGIN_DIR"
          
          echo "Plugin packaged: $zip_file"
          ls -lh releases/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Dave Themes Plugin v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Dave Themes Plugin v${{ steps.get_version.outputs.VERSION }}
            
            一个包含 12 个精美主题的 Obsidian 插件，支持一键切换。
            
            ### 包含主题 / Included Themes
            
            | 主题 | 支持模式 | 说明 |
            |------|---------|------|
            | **Dave Graphite** | Light + Dark | ⭐ 推荐主题，红黑经典配色 |
            | Dave Solarized | Light + Dark | Solarized 配色 |
            | Dave Duotone | Light + Dark | 双色调主题 |
            | Dave Toothpaste | Light + Dark | 薄荷色调 |
            | Dave Charcoal | Dark | 深炭黑主题 |
            | Dave Dracula | Dark | Dracula 配色 |
            | Dave Gotham | Dark | 深蓝主题 |
            | Dave High Contrast | Dark | 高对比度 |
            | Dave Panic Mode | Dark | 鲜艳粉/红色 |
            | Dave Cobalt | Dark | 钴蓝色调 |
            | Dave Dieci | Dark | 琥珀棕色 |
            | Dave Ayu | Dark | Ayu Mirage 配色 |
            
            ### 安装方法 / Installation
            
            1. 下载 `dave-themes-v${{ steps.get_version.outputs.VERSION }}.zip`
            2. 解压到 `[Vault]/.obsidian/plugins/dave-themes/`
            3. 重启 Obsidian
            4. 在设置 → 社区插件 → 已安装插件 中启用 Dave Themes
            5. 在 Dave Themes 设置中选择喜欢的主题
            
            ### 使用方法 / Usage
            
            1. 打开 Obsidian 设置
            2. 找到 "Dave Themes" 设置标签
            3. 从下拉菜单选择主题
            4. 主题会立即应用
          files: releases/*.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
