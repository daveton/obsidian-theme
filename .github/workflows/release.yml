name: Release Dave Themes

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package Individual Themes
        run: |
          mkdir -p releases
          
          # Package each theme individually (for manual installation)
          for theme_dir in dave-*/; do
            theme_name=$(basename "$theme_dir")
            zip_file="releases/${theme_name}-v${{ steps.get_version.outputs.VERSION }}.zip"
            
            if [ -f "${theme_dir}theme.css" ] && [ -f "${theme_dir}manifest.json" ]; then
              # Create a temporary directory with proper structure
              temp_dir="temp_${theme_name}"
              mkdir -p "$temp_dir"
              cp "${theme_dir}theme.css" "$temp_dir/"
              cp "${theme_dir}manifest.json" "$temp_dir/"
              
              # Create zip with theme folder inside
              cd "$temp_dir"
              zip -r "../$zip_file" .
              cd ..
              rm -rf "$temp_dir"
              
              echo "✓ Packaged: ${theme_name}"
            else
              echo "✗ Skipped ${theme_name}: missing theme.css or manifest.json"
            fi
          done

      - name: Package Plugin
        run: |
          # Build themes for plugin
          node scripts/build-themes.js
          
          # Create plugin package (for plugin installation)
          PLUGIN_DIR="dave-themes"
          mkdir -p "$PLUGIN_DIR"
          
          # Copy plugin files
          cp manifest.json "$PLUGIN_DIR/"
          cp main.js "$PLUGIN_DIR/"
          cp -r themes "$PLUGIN_DIR/"
          
          # Create plugin zip
          zip_file="releases/dave-themes-plugin-v${{ steps.get_version.outputs.VERSION }}.zip"
          zip -r "$zip_file" "$PLUGIN_DIR"
          
          echo "✓ Plugin packaged: dave-themes-plugin-v${{ steps.get_version.outputs.VERSION }}.zip"
          
          # Cleanup
          rm -rf "$PLUGIN_DIR"
          
          echo ""
          echo "All packages created:"
          ls -lh releases/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Dave Themes v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Dave Themes v${{ steps.get_version.outputs.VERSION }}
            
            一款精心设计的 Obsidian 主题系列，提供 4 个优雅的主题，全部支持浅色和深色双模式体验。
            
            ---
            
            ## 🚀 安装方式 / Installation Options
            
            ### 方式 1：Obsidian 主题商店（推荐）
            直接在 Obsidian 设置 → 外观 → 主题 → 管理 中搜索 "Dave Graphite" 安装。
            
            ### 方式 2：手动安装单个主题
            下载下方列表中的主题 zip 文件，解压到 `[Vault]/.obsidian/themes/[theme-name]/` 目录。
            
            ### 方式 3：Dave Themes 插件
            下载 **dave-themes-plugin-xxx.zip**，解压到 `[Vault]/.obsidian/plugins/dave-themes/`，在插件设置中切换 4 个主题。
            
            ---
            
            ## 📦 下载 / Downloads
            
            ### 插件包（方式 3）
            - **dave-themes-plugin-v${{ steps.get_version.outputs.VERSION }}.zip** - 包含所有主题的插件
            
            ### 单个主题包（方式 2）
            
            | 主题 | 支持模式 | 说明 |
            |------|---------|------|
            | **dave-graphite** | Light + Dark | ⭐ 推荐主题，红黑经典配色 |
            | dave-solarized | Light + Dark | Solarized 配色 |
            | dave-duotone | Light + Dark | 双色调主题 |
            | dave-toothpaste | Light + Dark | 薄荷色调 |
          files: releases/*.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
